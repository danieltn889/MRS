name: Deploy to AWS (Danny_host_2)

# Runs on every push to main, and can be triggered manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # The runner checks out the repo using its OWN built-in token (works for
      # private repos too). No personal access token is ever placed on the server.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Test gate — if these fail, the job stops here and NOTHING is deployed.
      - name: Backend tests
        run: |
          cd source-code/backend
          npm ci || npm install
          npm run test:audit-chain

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # Copy the code to the server. Excludes are important:
      #  - .git/node_modules: rebuilt on the server
      #  - .env: the server keeps its OWN production .env (never overwritten)
      #  - ssh_key.pem: never ship the key
      - name: Rsync code to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='**/node_modules' \
            --exclude='.env' \
            --exclude='**/.env' \
            --exclude='ssh_key.pem' \
            --exclude='**/dist' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/SVWR-CFE/"

      - name: Build & restart on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "cd ~/SVWR-CFE && chmod +x deploy.sh && ./deploy.sh"

      # Verify the services are actually responding after deploy. Fails the run
      # (and surfaces in the Actions log) if any health check doesn't pass.
      - name: Verify deployment (health checks)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" '
            set -e
            echo "⏳ giving services time to boot…"; sleep 20
            ok=true
            check () { # name url
              if curl -fsS -m 15 "$2" >/dev/null 2>&1; then echo "✅ $1 healthy"; else echo "❌ $1 FAILED ($2)"; ok=false; fi
            }
            check "backend"  "http://127.0.0.1:3001/health"
            check "ml"       "http://127.0.0.1:8080/matcher/health"
            check "frontend" "http://127.0.0.1:3000"
            echo "--- pm2 ---"; pm2 status || true
            $ok || { echo "🔴 Deployment verification failed"; exit 1; }
            echo "🟢 All services healthy"
          '
