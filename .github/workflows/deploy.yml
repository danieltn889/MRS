name: Deploy to AWS (Danny_host_2)

# Runs on every push to main, and can be triggered manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping deploys.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}        # 16.192.28.113 (set as a GitHub secret)
          username: ${{ secrets.SERVER_USER }}    # ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}     # the FULL contents of ssh_key.pem
          port: 22
          command_timeout: 40m
          script_stop: true
          script: |
            set -e
            APP_DIR="$HOME/SVWR-CFE"
            REPO="https://github.com/danieltn889/SVWR-CFE.git"

            # First run: clone. Later runs: hard-reset to the pushed commit.
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$REPO" "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            # Run the deploy script (installs deps, builds, restarts services).
            chmod +x deploy.sh
            ./deploy.sh
