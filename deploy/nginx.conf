# Nginx reverse proxy for SVWR-CFE (single entry point on port 80/443).
# Install on the server:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/svwr
#   sudo ln -sf /etc/nginx/sites-available/svwr /etc/nginx/sites-enabled/svwr
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Routes:  /api → backend(3001) · /matcher → ML gateway(8080) · /socket.io → backend · / → frontend(3000)

server {
    listen 80;
    server_name 51.21.51.222;   # ← replace with your domain when you have one

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    client_max_body_size 10M;     # allow file/resume uploads

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Backend API (Express, port 3001; routes under /api/v1) ──
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Backend health check ──
    location = /health {
        proxy_pass http://127.0.0.1:3001/health;
        access_log off;
    }

    # ── Uploaded files (profile photos, resumes, documents) served by the backend ──
    location /uploads/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 10M;
    }

    # ── ML gateway (FastAPI, port 8080; exposes /matcher, /hybrid → 8003, /search → 8001) ──
    location /matcher/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;   # model cold-start can be slow
    }
    location /hybrid/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;   # model cold-start can be slow
    }
    location /search/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # ── WebSockets (Socket.IO) → backend ──
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # ── Frontend (Vite preview, port 3000)   everything else ──
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

# ── HTTPS (Let's Encrypt) ──────────────────────────────────────────────────────
# Requires a real DOMAIN pointing at 51.21.51.222 (certbot can't issue for a bare IP).
# Once DNS is set:
#   sudo apt-get install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d your-domain.com
# certbot rewrites this file to add the 443 server block + auto-renews.
